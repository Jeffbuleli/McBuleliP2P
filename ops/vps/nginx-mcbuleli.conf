# Reverse proxy for McBuleli Next.js on VPS principal 162.35.181.98
# Place under /etc/nginx/sites-available/mcbuleli.org and symlink sites-enabled.
# TLS: certbot --nginx -d mcbuleli.org -d www.mcbuleli.org
#
# live.mcbuleli.org is a SEPARATE nginx site (Jitsi). Do not merge here —
# see ops/jitsi/ + ops/vps/migrate-live-from-old.sh + ops/vps/SERVER.md

upstream mcbuleli_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name mcbuleli.org www.mcbuleli.org;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://mcbuleli.org$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.mcbuleli.org;

  # ssl_certificate /etc/letsencrypt/live/mcbuleli.org/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/mcbuleli.org/privkey.pem;

  return 301 https://mcbuleli.org$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mcbuleli.org;

  # ssl_certificate /etc/letsencrypt/live/mcbuleli.org/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/mcbuleli.org/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://mcbuleli_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
  }
}
