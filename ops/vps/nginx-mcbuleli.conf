# Reverse proxy for McBuleli Next.js on VPS principal 162.35.181.98
# Place under /etc/nginx/sites-available/mcbuleli.org and symlink sites-enabled.
# TLS: certbot / existing certs under /etc/ssl/mcbuleli/
#
# live.mcbuleli.org is a SEPARATE nginx site (Jitsi). Do not merge here.
#
# Client IP: never append client-supplied X-Forwarded-For.
# Prefer Cloudflare CF-Connecting-IP when present (orange-cloud), else $remote_addr.
# Requires: /etc/nginx/conf.d/00-mcbuleli-client-ip.conf (map $mcb_client_ip)

upstream mcbuleli_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name mcbuleli.org www.mcbuleli.org;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://mcbuleli.org$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.mcbuleli.org;

  ssl_certificate /etc/ssl/mcbuleli/fullchain.pem;
  ssl_certificate_key /etc/ssl/mcbuleli/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  return 301 https://mcbuleli.org$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name mcbuleli.org;

  ssl_certificate /etc/ssl/mcbuleli/fullchain.pem;
  ssl_certificate_key /etc/ssl/mcbuleli/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 25m;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # Block OpenWA webhook permanently (removed from McBuleli)
  location = /api/webhooks/openwa/inbound {
    return 410;
  }

  location / {
    proxy_pass http://mcbuleli_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $mcb_client_ip;
    proxy_set_header X-Forwarded-For $mcb_client_ip;
    proxy_set_header CF-Connecting-IP $mcb_client_ip;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
  }
}
