# Snippet for /etc/nginx/sites-available/live.mcbuleli.org
# Sans ?jwt= → renvoi vers McBuleli (compte), pas le formulaire User/Password Jitsi.
#
# Coller DANS le server { } HTTPS, AVANT le location / proxy Jitsi.

# Racine → Academy
location = / {
    return 302 https://mcbuleli.org/app/academy;
}

# Salles : pas de jwt → passerelle McBuleli
location ~ ^/([a-zA-Z0-9_-]+)$ {
    if ($arg_jwt = "") {
        return 302 https://mcbuleli.org/app/live/enter?room=$1&$args;
    }
    try_files $uri @jitsi;
}

# Adapter @jitsi / proxy selon votre vhost existant (copier depuis la config actuelle).
