# Contrôle total : live.mcbuleli.org → mcbuleli.org si pas de JWT.
# À fusionner dans /etc/nginx/sites-available/live.mcbuleli.org (server HTTPS).

# Racine
location = / {
    return 302 https://mcbuleli.org/login?next=/app/academy;
}

# Assets Jitsi (nécessaires une fois le jwt présent)
location ~ ^/(libs|css|js|static|images|lang|sounds|fonts)/ {
    proxy_pass http://localhost:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Salle : sans jwt → login McBuleli (ou enter si room connue)
location ~ ^/([a-zA-Z0-9][a-zA-Z0-9_-]*)$ {
    if ($arg_jwt = "") {
        return 302 https://mcbuleli.org/login?next=/app/live/enter?room=$1;
    }
    proxy_pass http://localhost:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Tout le reste sans jwt → Academy
location / {
    if ($arg_jwt = "") {
        return 302 https://mcbuleli.org/login?next=/app/academy;
    }
    proxy_pass http://localhost:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
}
