name: Cron scheduled (infrequent)

# Calls McBuleli /api/internal/* with x-cron-secret.
# Required Actions secrets (Settings → Secrets → Actions):
#   CRON_SECRET       — same as ops/vps/.env / cron.env on the VPS
#   MCBULELI_API_URL  — https://mcbuleli.org
#
# High-frequency money/bots stay on VPS (ops/vps/crontab).

on:
  schedule:
    - cron: "*/15 * * * *"
    # journey-nudge daily disabled — burns Resend free transactional quota (~1k/day).
    # Marketing blasts → Resend Broadcasts. Re-enable only with ACADEMY_JOURNEY_NUDGE_EMAIL=true on API.
    - cron: "0 1 * * 0"
  workflow_dispatch:
    inputs:
      job:
        description: "Which cron to run"
        required: true
        default: all-15m
        type: choice
        options:
          - all-15m
          - wallet-retry
          - academy-reminders
          - game-tick
          - events-reminders
          - nudge
          - payout

concurrency:
  group: mcbuleli-cron-${{ github.event.schedule || inputs.job }}
  cancel-in-progress: false

env:
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  MCBULELI_API_URL: ${{ secrets.MCBULELI_API_URL }}

jobs:
  every-15m:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *')
      || (github.event_name == 'workflow_dispatch' && (
           inputs.job == 'all-15m'
           || inputs.job == 'wallet-retry'
           || inputs.job == 'academy-reminders'
           || inputs.job == 'game-tick'
           || inputs.job == 'events-reminders'
         ))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: wallet-retry
            script: scripts/cron-wallet-retry-failed-jobs.mjs
          - id: academy-reminders
            script: scripts/cron-academy-reminders.mjs
          - id: game-tick
            script: scripts/cron-game-tick.mjs
          - id: events-reminders
            script: scripts/cron-events-reminders.mjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check secrets
        run: |
          if [ -z "${CRON_SECRET}" ] || [ "${#CRON_SECRET}" -lt 12 ]; then
            echo "::error::Missing or short CRON_SECRET. GitHub → Settings → Secrets and variables → Actions → New repository secret: CRON_SECRET (= same value as /opt/mcbuleli/ops/vps/cron.env on the VPS)."
            exit 1
          fi
          if [ -z "${MCBULELI_API_URL}" ]; then
            echo "::error::Missing MCBULELI_API_URL. Set secret MCBULELI_API_URL=https://mcbuleli.org"
            exit 1
          fi
          echo "Secrets present. API=${MCBULELI_API_URL}"
      - name: Run ${{ matrix.id }}
        if: >
          github.event_name == 'schedule'
          || inputs.job == 'all-15m'
          || inputs.job == matrix.id
        run: node "${{ matrix.script }}"

  # Manual only (nudge). Daily 09:00 UTC removed — Resend free quota is for transactional.
  journey-nudge:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'nudge'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check secrets
        run: |
          if [ -z "${CRON_SECRET}" ] || [ "${#CRON_SECRET}" -lt 12 ]; then
            echo "::error::Missing CRON_SECRET (min 12 chars) in Actions secrets."
            exit 1
          fi
          if [ -z "${MCBULELI_API_URL}" ]; then
            echo "::error::Missing MCBULELI_API_URL. Use https://mcbuleli.org"
            exit 1
          fi
      - name: Academy journey nudge (no-op unless ACADEMY_JOURNEY_NUDGE_EMAIL=true on API)
        run: node scripts/cron-academy-journey-nudge.mjs

  top-trader-payout:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * 0')
      || (github.event_name == 'workflow_dispatch' && inputs.job == 'payout')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check secrets
        run: |
          if [ -z "${CRON_SECRET}" ] || [ "${#CRON_SECRET}" -lt 12 ]; then
            echo "::error::Missing CRON_SECRET (min 12 chars) in Actions secrets."
            exit 1
          fi
          if [ -z "${MCBULELI_API_URL}" ]; then
            echo "::error::Missing MCBULELI_API_URL. Use https://mcbuleli.org"
            exit 1
          fi
      - name: Top trader weekly payout
        run: node scripts/cron-top-trader-payout.mjs
