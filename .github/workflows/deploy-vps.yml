name: Deploy VPS (from GitHub)

# Prod deploys ONLY from GitHub main — not from laptop rsync.
# Secrets (Settings → Secrets → Actions):
#   VPS_HOST          e.g. 162.35.181.98
#   VPS_USER          e.g. root
#   VPS_SSH_KEY       private key with deploy access
# Optional:
#   VPS_REPO_DIR      default /opt/mcbuleli

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mcbuleli-deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy via SSH (git pull + docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            REPO="${{ secrets.VPS_REPO_DIR }}"
            REPO="${REPO:-/opt/mcbuleli}"
            if [[ ! -x "$REPO/ops/vps/deploy.sh" ]]; then
              chmod +x "$REPO/ops/vps/deploy.sh" || true
            fi
            # Bootstrap: ensure deploy.sh exists from previous clone
            if [[ ! -f "$REPO/ops/vps/deploy.sh" ]]; then
              git -C "$REPO" fetch origin main
              git -C "$REPO" checkout -B main origin/main
              chmod +x "$REPO/ops/vps/deploy.sh"
            fi
            bash "$REPO/ops/vps/deploy.sh"
