# Optional Render Blueprint — import in Dashboard → Blueprints.
# Web service (McBuleli Next.js) is usually created separately.
# Either enable BOT_CRON_INLINE=1 on the web service OR use mcbuleli-bots-tick below.
#
# Cron jobs do NOT inherit Web env vars. Set CRON_SECRET + MCBULELI_API_URL on each cron
# (same CRON_SECRET as Web). See docs/wallet-cron-render.md

envVarGroups:
  - name: mcbuleli-cron-env
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

services:
  - type: cron
    name: mcbuleli-kyc-sync
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-kyc-sync-pending.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-governance-tick
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-governance-tick.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-bots-tick
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/5 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-bots-tick.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # USDT wallet automation — deposit scanner, withdraw worker, retry queue
  - type: cron
    name: mcbuleli-wallet-deposit-scan
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/2 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-wallet-deposit-scan.mjs
    envVarGroups:
      - mcbuleli-cron-env

  - type: cron
    name: mcbuleli-wallet-withdraw-worker
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/1 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-wallet-withdraw-worker.mjs
    envVarGroups:
      - mcbuleli-cron-env

  - type: cron
    name: mcbuleli-wallet-retry-jobs
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-wallet-retry-failed-jobs.mjs
    envVarGroups:
      - mcbuleli-cron-env

  - type: cron
    name: mcbuleli-ai-relay
    runtime: python
    region: oregon
    plan: starter
    schedule: "*/1 * * * *"
    rootDir: services/mcbuleli-ai-trading
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/relay_all_instances.py
    envVars:
      - key: MODE
        value: SIGNAL_ONLY
      - key: MCBULELI_API_URL
        sync: false
      - key: MCBULELI_CRON_SECRET
        sync: false
      - key: MCBULELI_INSTANCE_ID
        value: ""
      - key: TWITTER_ENABLED
        value: "1"
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: X_LLM_ENABLED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: SIGNAL_MIN_EDGE
        value: "15"
      - key: X_LLM_BLEND_WEIGHT
        value: "0.55"

  # Alternative: continuous worker (uncomment and disable cron above if preferred).
  # - type: worker
