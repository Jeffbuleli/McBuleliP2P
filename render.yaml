# LEGACY Render Blueprint — migrating off Render → VPS + GitHub Actions.
# See docs/vps-migration.md · ops/vps/ · .github/workflows/cron-scheduled.yml
#
# Cron jobs do NOT inherit Web env vars. Set CRON_SECRET + MCBULELI_API_URL on each cron
# (same CRON_SECRET as Web). See docs/wallet-cron-render.md

services:
  - type: cron
    name: mcbuleli-kyc-sync
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-kyc-sync-pending.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-governance-tick
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-governance-tick.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-bots-tick
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/5 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-bots-tick.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # USDT wallet automation — deposit scanner, withdraw worker, retry queue
  - type: cron
    name: mcbuleli-wallet-deposit-scan
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/2 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-wallet-deposit-scan.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-wallet-withdraw-worker
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/1 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-wallet-withdraw-worker.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # Academy — session reminders (24h / 1h before live)
  - type: cron
    name: mcbuleli-academy-reminders
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-academy-reminders.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # DISABLED on Render — journey emails burn Resend free transactional quota.
  # Prefer Resend Broadcasts for marketing; API reserved for auth/wallet/KYC.
  # To revive: uncomment + set ACADEMY_JOURNEY_NUDGE_EMAIL=true on the web service.
  # - type: cron
  #   name: mcbuleli-academy-journey-nudge
  #   runtime: node
  #   region: oregon
  #   plan: starter
  #   schedule: "0 9 * * *"
  #   buildCommand: "true"
  #   startCommand: node scripts/cron-academy-journey-nudge.mjs
  #   envVars:
  #     - key: MCBULELI_API_URL
  #       sync: false
  #     - key: CRON_SECRET
  #       sync: false

  - type: cron
    name: mcbuleli-game-economy-tick
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-game-tick.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-wallet-retry-jobs
    runtime: node
    region: oregon
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: "true"
    startCommand: node scripts/cron-wallet-retry-failed-jobs.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-top-trader-payout
    runtime: node
    region: oregon
    plan: starter
    schedule: "0 1 * * 0"
    buildCommand: "true"
    startCommand: node scripts/cron-top-trader-payout.mjs
    envVars:
      - key: MCBULELI_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mcbuleli-ai-relay
    runtime: python
    region: oregon
    plan: starter
    schedule: "*/1 * * * *"
    rootDir: services/mcbuleli-ai-trading
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/relay_all_instances.py
    envVars:
      - key: MODE
        value: SIGNAL_ONLY
      - key: MCBULELI_API_URL
        sync: false
      - key: MCBULELI_CRON_SECRET
        sync: false
      - key: MCBULELI_INSTANCE_ID
        value: ""
      - key: TWITTER_ENABLED
        value: "1"
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: X_LLM_ENABLED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: SIGNAL_MIN_EDGE
        value: "15"
      - key: X_LLM_BLEND_WEIGHT
        value: "0.55"

