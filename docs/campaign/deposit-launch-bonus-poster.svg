  <text x="540" y="815" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" fill="#fff">Déposez sur McBuleli</text>

  <!-- coordonnées -->
  <text x="540" y="920" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#5a7a5c">ceo@mcbuleli.org · +243 997 366 736</text>
  <text x="540" y="960" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="#8aa08c">Wallet · P2P · Mobile Money · RDC &amp; Afrique</text>
