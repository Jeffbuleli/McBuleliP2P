<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="McBuleli  Bonus dépôt">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4faf4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#305f33" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- fond -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="48" y="48" width="984" height="984" rx="48" fill="#fff" stroke="#d8ead9" stroke-width="3" filter="url(#soft)"/>

  <!-- logo McBuleli (arbre circuit) -->
  <g transform="translate(120 108)">
    <circle cx="56" cy="56" r="56" fill="#e8f3e9" stroke="#305f33" stroke-width="3"/>
    <path d="M56 24 L56 44 M56 44 C44 44 36 54 36 66 C36 78 44 88 56 88 C68 88 76 78 76 66 C76 54 68 44 56 44 Z" fill="none" stroke="#c62828" stroke-width="4" stroke-linecap="round"/>
    <path d="M56 52 L48 72 M56 52 L64 72 M56 52 L56 68" fill="none" stroke="#c62828" stroke-width="3.5" stroke-linecap="round"/>
    <text x="128" y="48" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#1a2e1b">McBuleli</text>
    <text x="128" y="82" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#5a7a5c">mcbuleli.org</text>
  </g>

  <!-- bonus principal -->
  <text x="540" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="#305f33">+5 USDT</text>
  <text x="540" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1a2e1b">Bonus dépôt · 10 places</text>

  <!-- détails minimalistes -->
  <g font-family="Arial, Helvetica, sans-serif" fill="#2d4a2f">
    <rect x="180" y="470" width="720" height="220" rx="28" fill="#f0f7f0" stroke="#c5dcc6" stroke-width="2"/>
    <text x="540" y="540" text-anchor="middle" font-size="30" font-weight="700">5 × Mobile Money · dčs 20 $</text>
    <text x="540" y="590" text-anchor="middle" font-size="30" font-weight="700">5 × USDT · dčs 20 USDT</text>
    <text x="540" y="650" text-anchor="middle" font-size="26" font-weight="600" fill="#5a7a5c">72 heures · 1 bonus par utilisateur</text>
  </g>

